<style>
    /* Default - desktop */
    :root {
        --hero-overall-height: 80vh;
        --header-logo-nav-gap: 1.5rem;
        --mce-dark-red: #810305;
        --mce-sepia-tan: #D4AF85;
    }

    /* Box model normalization */
    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* 
    ==================================================
    ODOO OVERRIDE
    ==================================================
    Remove Odoo's default container constraints
    */

    /* Remove max-width constraints from Odoo containers */
    .o_container,
    .o_container_small,
    .container,
    .container-fluid {
        max-width: none !important;
        padding: 0 !important;
    }

    /* Ensure sections can be full-width */
    section {
        width: 100%;
        max-width: 100%;
        margin: 0 !important;
    }

    /* Remove any row constraints */
    .row {
        margin-left: 0 !important;
        margin-right: 0 !important;
    }

    /* Remove gaps between Odoo blocks/widgets */
    .o_colored_level,
    .s_allow_columns,
    [data-snippet] {
        margin-top: 0 !important;
        margin-bottom: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
    }

    a:hover {
        /* remove auto highlighting links */
        text-decoration: none !important;
    }

    /* Wrapper for utility bar + hero */
    .hero-wrapper {
        position: relative;
        width: 100%;
        height: var(--hero-overall-height);
    }

    /* Utility Bar */
    .utility-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 6vh;
        background: #000;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 0 4rem;
        gap: 2rem;
        z-index: 2000;
        border-bottom: 1px solid rgba(212, 175, 133, 0.3);
    }

    /* Explicit button reset */
    .utility-bar button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
    }

    .utility-bar-logo {
        width: 3.5vh;
        height: 3.5vh;
        border-radius: 50%;
        object-fit: cover;
        background-color: white;
        border: 1px solid rgba(212, 175, 133, 0.4);
    }

    /* Scroll-to-top is now a <button>, not an <a> */
    .utility-bar button:has(.utility-bar-logo) {
        margin-right: auto;
        display: flex;
        align-items: center;
    }

    .utility-bar form {
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }

    /* Visually-hidden label for the search input */
    #customSearchForm label {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    .utility-bar input[type="search"] {
        padding: 0.3rem 0.8rem;
        border: none;
        border-bottom: 1px solid var(--mce-sepia-tan);
        background: transparent;
        color: var(--mce-sepia-tan);
        font-family: 'Outfit', sans-serif;
        font-size: 0.85rem;
        width: 180px;
        transition: all 0.3s ease;
    }

    .utility-bar input[type="search"]::placeholder {
        color: var(--mce-sepia-tan);
        opacity: 0.7;
    }

    .utility-bar input[type="search"]:focus {
        outline: none;
        border-bottom-color: white;
        width: 220px;
    }

    .utility-bar button,
    .utility-bar a {
        background: transparent;
        border: none;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: color 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
    }

    .utility-bar button:hover,
    .utility-bar a:hover {
        color: var(--mce-sepia-tan);
    }

    #accountMenu {
        position: absolute;
        top: 100%;
        right: 4rem;
        background: rgba(0, 0, 0, 0.95);
        border: 1px solid var(--mce-sepia-tan);
        border-top: none;
        min-width: 150px;
        margin-top: 0;
    }

    #accountMenu a {
        display: block;
        padding: 0.8rem 1.2rem;
        color: white;
        text-decoration: none;
        font-size: 0.85rem;
        border-bottom: 1px solid rgba(212, 175, 133, 0.2);
        transition: background 0.3s ease;
    }

    #accountMenu a:last-child {
        border-bottom: none;
    }

    #accountMenu a:hover {
        background: rgba(129, 3, 5, 0.3);
    }

    /* Hero Black Gradient BG Section */
    .hero-black-bg-section {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
    }

    .hero-black-bg-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        background: radial-gradient(circle at top right, rgba(129, 3, 5, 0.15), transparent 60%),
            radial-gradient(circle at bottom left, rgba(212, 175, 133, 0.08), transparent 60%);
        animation: slideAccentIn 1.5s ease-out forwards;
        pointer-events: none;
    }

    @keyframes slideAccentIn {
        to {
            left: 0;
        }
    }

    .hero-header {
        position: absolute;
        top: 6vh;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 3rem 4rem;
        z-index: 1002;
        border-bottom: 2px solid var(--mce-dark-red);
    }

    /*
     * .hero-logo uses a <p> tag (not <h2>) so the heading outline stays clean.
     * The site name is not a page section heading.
     */
    .hero-logo {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    .hero-logo .mce-name {
        font-family: 'Michroma', sans-serif;
        font-size: 1.05rem;
        font-weight: 400;
        text-align: left;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding-top: 0;

        /* Gradient text - white for 60%, then fade to grey */
        background: linear-gradient(to right, white 60%, #b0b0b0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .hero-nav {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex: 1;
        min-width: 0;
        flex-wrap: nowrap;
        /* explicit no wrapping ever */
        overflow: hidden;
        /* safety net so it never bleeds */
        margin-left: var(--header-logo-nav-gap);
    }

    .hero-nav a {
        color: white;
        text-decoration: none;
        font-weight: 300;
        letter-spacing: 0.05em;
        transition: opacity 0.3s ease, font-size 0.15s ease;
        white-space: nowrap;
        padding: 0 0.75rem;
    }

    .hero-nav a:hover {
        opacity: 0.7;
    }

    /* Hamburger menu - hidden on desktop */
    .hamburger {
        display: none;
        background: none;
        border: none;
        padding: 0;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
        z-index: 1003;
        position: relative;
    }

    .hamburger span {
        width: 30px;
        height: 3px;
        background-color: white;
        transition: all 0.3s ease;
    }

    .hamburger.active span {
        background-color: var(--mce-sepia-tan);
    }

    .hamburger.active span:nth-child(1) {
        transform: rotate(45deg) translate(8px, 8px);
    }

    .hamburger.active span:nth-child(2) {
        opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
        transform: rotate(-45deg) translate(8px, -8px);
    }

    /* Hamburger drawer menu */
    .hamburger-drawer {
        display: block;
        position: fixed;
        top: 6vh;
        right: -100%;
        width: 280px;
        height: calc(100vh - 6vh);
        background: rgba(0, 0, 0, 0.95);
        z-index: 1001;
        transition: right 0.3s ease;
        padding: 11rem 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
    }

    .hamburger-drawer.active {
        right: 0;
    }

    .hamburger-drawer a {
        display: block;
        color: white;
        text-decoration: none;
        font-size: 1.1rem;
        font-weight: 300;
        letter-spacing: 0.05em;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid rgba(212, 175, 133, 0.2);
        transition: background 0.3s ease;
    }

    .hamburger-drawer a:hover {
        background: rgba(129, 3, 5, 0.3);
    }

    .hero-content {
        min-height: var(--hero-overall-height);
        width: 100%;
        padding-left: 4rem;
        /* Match the hero-header padding */
        padding-top: calc(6vh + 10rem);
        /* 6vh utility bar + approximate header height + some spacing */

        /* Justification & Alignment */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        text-align: left;

        gap: 1.5rem;
        position: relative;
        z-index: 3;

        /* Initial state for animation */
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInContent 1s ease-out 0.3s forwards;
    }

    @keyframes fadeInContent {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .hero-content .hero-title-container {
        display: flex;
        justify-content: flex-start;
        width: 100%;
        padding-top: 5%;
    }

    .hero-content .hero-title {
        font-family: 'Michroma', sans-serif;
        font-size: 5vw;
        color: var(--mce-sepia-tan);
        margin-bottom: 1.5rem;
        letter-spacing: 0.05em;
        line-height: 1.2;
    }

    .hero-content .hero-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 300;
        font-size: 1.2rem;
        max-width: 60%;
        color: #cccccc;
        line-height: 1.7;
        margin-bottom: 2rem;
    }

    .hero-content .hero-separator {
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, var(--mce-dark-red), var(--mce-sepia-tan));
        opacity: 0;
        animation: expandLine 1s ease-out 0.8s forwards;
    }

    @keyframes expandLine {
        from {
            width: 0;
            opacity: 0;
        }

        to {
            width: 120px;
            opacity: 1;
        }
    }

    /* Tablet: 481px to 768px */
    @media (max-width: 768px) and (min-width: 481px) {

        .utility-bar {
            padding: 0 2rem;
            gap: 1.5rem;
        }

        .utility-bar input[type="search"] {
            width: 140px;
            font-size: 0.8rem;
        }

        .utility-bar input[type="search"]:focus {
            width: 170px;
        }

        .utility-bar button,
        .utility-bar a {
            font-size: 0.95rem;
        }

        .hero-header {
            padding: 2rem 3rem;
        }

        .hero-logo .mce-name {
            font-size: 1.3rem;
        }

        .hero-content {
            padding-left: 10%;
            padding-right: 10%;
            width: 80%;
        }

        .hero-content .hero-title {
            font-size: 7.5vw;
        }
    }

    /* Mobile: 480px and below */
    @media (max-width: 480px) {

        .utility-bar {
            padding: 0 1.5rem;
            gap: 1rem;
        }

        .utility-bar input[type="search"] {
            width: 100px;
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
        }

        .utility-bar input[type="search"]:focus {
            width: 120px;
        }

        .utility-bar button,
        .utility-bar a {
            font-size: 0.9rem;
        }

        #accountMenu {
            right: 1.5rem;
        }

        .hero-header {
            padding: 1.5rem 2rem;
        }

        .hero-logo .mce-name {
            font-size: 1.1rem;
        }

        .hamburger-drawer {
            width: 100%;
        }

        .hero-content {
            padding-left: 8%;
            padding-right: 8%;
            width: 84%;
        }

        .hero-content .hero-title {
            font-size: 10vw;
        }

        .hero-content .hero-text {
            max-width: 90%;
        }
    }
</style>

<div class="hero-wrapper">
    <!-- Utility Bar -->
    <div class="utility-bar">
        <!--
            Scroll-to-top: <button> instead of <a href="#"> so it's unambiguously
            an action for screen readers and crawlers.
        -->
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Scroll to top">
            <img src="/documents/content/naZlHr47T1uGIwXrx_h2uQo2f?download=0" alt="" class="utility-bar-logo"
                width="40" height="40">
        </button>

        <!--
            Visually-hidden <label> associates the search input with accessible
            text without showing it on screen (WCAG 1.3.1 / 4.1.2).
        -->
        <form method="get" action="/website/search" id="customSearchForm">
            <label for="customSearchInput">Search</label>
            <input type="search" name="search" id="customSearchInput" placeholder="Search...">
            <input name="order" type="hidden" value="name asc">
            <button type="submit" id="customSearchBtn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true" focusable="false">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </button>
        </form>

        <!-- aria-label gives the cart link an accessible name (icon-only link) -->
        <a href="/shop/cart" aria-label="Shopping cart">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
                focusable="false">
                <circle cx="8" cy="21" r="1"></circle>
                <circle cx="19" cy="21" r="1"></circle>
                <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
            </svg>
        </a>

        <div id="customAccount"></div>
    </div>

    <!-- Main black gradient bg section -->
    <!--
        aria-labelledby points to the h1 inside, giving this landmark region
        a meaningful name for screen readers.
    -->
    <section class="hero-black-bg-section" aria-labelledby="heroTitle">

        <header class="hero-header">
            <div class="hero-logo">
                <!--
                    Site name uses <p> (not <h2>) — it's brand identity, not a
                    section heading. The page h1 is .hero-title below.
                -->
                <a href="/" aria-label="Mid City Engineering — Home">
                    <p class="mce-name">MID CITY ENGINEERING</p>
                </a>
            </div>

            <!-- aria-label distinguishes this from the footer nav landmark -->
            <nav class="hero-nav" aria-label="Main navigation"></nav>

            <!--
                Hamburger: <button> for keyboard and screen-reader access.
                aria-expanded tracks open/closed state; aria-controls points to drawer.
            -->
            <button class="hamburger" aria-expanded="false" aria-controls="hamburgerDrawer"
                aria-label="Toggle navigation" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <!--
            inert: drawer links are not focusable when closed.
            Removed by toggleMenu() when the drawer opens.
        -->
        <div class="hamburger-drawer" id="hamburgerDrawer" aria-label="Mobile navigation" inert></div>

        <div class="hero-content">
            <div class="hero-title-container">
                <!-- h1: primary page heading for SEO and document outline -->
                <h1 class="hero-title" id="heroTitle">Placeholder Title</h1>
            </div>

            <div class="hero-separator"></div>

            <div class="hero-text-container">
                <p class="hero-text">
                    Set heroReplacementTitle &amp; heroReplacementText in the Odoo embed code widget
                    to non-null values for them to be displayed. Set them to empty strings to hide them.
                </p>
            </div>
        </div>
    </section>
</div>

<script>

    // ─── NAV + RESPONSIVE LAYOUT ──────────────────────────────────────────────────
    (function () {
        const NAV_ITEMS = [
            { label: 'Home', href: '/' },
            { label: 'About Us', href: '/about-us' },
            { label: 'Products', href: '/shop' },
            { label: 'Dealer Locator', href: '/dealer-locator' },
            { label: 'Become a Dealer', href: '/become-dealer/' },
            { label: 'Installation Manuals', href: '/installation-manuals' },
            { label: 'Support', href: '/support' },
        ];

        const MIN_FONT_REM = 0.90;
        const MAX_FONT_REM = 1.15;
        const ITEM_PAD_REM = 0.75;

        const header = document.querySelector('.hero-header');
        const logo = document.querySelector('.hero-logo');
        const nav = document.querySelector('.hero-nav');
        const hamburger = document.querySelector('.hamburger');
        const drawer = document.getElementById('hamburgerDrawer');

        if (!header || !logo || !nav || !hamburger || !drawer) return;

        nav.innerHTML = NAV_ITEMS
            .map(item => `<a href="${item.href}">${item.label}</a>`)
            .join('');

        // Drawer links call toggleMenu() to close the drawer on navigation
        drawer.innerHTML = NAV_ITEMS
            .map(item => `<a href="${item.href}" onclick="toggleMenu()">${item.label}</a>`)
            .join('');

        let textWidthsAt1rem = [];

        function measureNavItems() {
            const remPx = parseFloat(getComputedStyle(document.documentElement).fontSize);
            const clone = nav.cloneNode(true);
            Object.assign(clone.style, {
                position: 'absolute',
                visibility: 'hidden',
                fontSize: '1rem',
                whiteSpace: 'nowrap',
                display: 'flex',
                pointerEvents: 'none',
            });
            clone.querySelectorAll('a').forEach(a => a.style.padding = '0');
            document.body.appendChild(clone);
            textWidthsAt1rem = Array.from(clone.querySelectorAll('a'))
                .map(a => a.getBoundingClientRect().width);
            document.body.removeChild(clone);
            return remPx;
        }

        function update(remPx) {
            const headerRect = header.getBoundingClientRect();
            const logoRect = logo.getBoundingClientRect();
            const headerStyle = getComputedStyle(header);
            const headerPad = parseFloat(headerStyle.paddingLeft) + parseFloat(headerStyle.paddingRight);
            const navGapPx = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--header-logo-nav-gap')) * remPx;
            const available = headerRect.width - headerPad - logoRect.width - navGapPx - 32;
            const totalTextAt1rem = textWidthsAt1rem.reduce((s, w) => s + w, 0);
            const totalPaddingAt1rem = ITEM_PAD_REM * 2 * remPx * NAV_ITEMS.length;
            const totalAt1rem = totalTextAt1rem + totalPaddingAt1rem;
            const candidateFontRem = Math.min(available / totalAt1rem, MAX_FONT_REM);

            if (candidateFontRem < MIN_FONT_REM) {
                nav.style.display = 'none';
                hamburger.style.display = 'flex';
            } else {
                nav.style.display = 'flex';
                hamburger.style.display = 'none';
                nav.style.fontSize = candidateFontRem + 'rem';
                drawer.classList.remove('active');
                hamburger.classList.remove('active');
            }
        }

        document.fonts.ready.then(() => {
            const remPx = measureNavItems();
            update(remPx);
            const ro = new ResizeObserver(() => update(remPx));
            ro.observe(header);
        });
    })();

    // ─── HAMBURGER TOGGLE ─────────────────────────────────────────────────────────
    function toggleMenu() {
        const hamburger = document.querySelector('.hamburger');
        const drawer = document.getElementById('hamburgerDrawer');
        if (!drawer || !hamburger) return;

        hamburger.classList.toggle('active');
        drawer.classList.toggle('active');

        const isOpen = drawer.classList.contains('active');
        hamburger.setAttribute('aria-expanded', isOpen);
        if (isOpen) drawer.removeAttribute('inert');
        else drawer.setAttribute('inert', '');

        document.body.style.position = isOpen ? 'fixed' : '';
        document.body.style.width = isOpen ? '100%' : '';
    }

    // Close drawer on outside click
    document.addEventListener('click', function (event) {
        const drawer = document.getElementById('hamburgerDrawer');
        const hamburger = document.querySelector('.hamburger');
        if (!drawer || !hamburger) return;
        if (drawer.classList.contains('active') && !drawer.contains(event.target) && !hamburger.contains(event.target)) {
            toggleMenu();
        }
    });

    // Close drawer on outside touch-scroll
    window.addEventListener('touchmove', function (e) {
        const drawer = document.getElementById('hamburgerDrawer');
        if (drawer && drawer.classList.contains('active') && !drawer.contains(e.target)) {
            toggleMenu();
        }
    }, { passive: true });

    // ─── ACCOUNT DROPDOWN ─────────────────────────────────────────────────────────
    (function () {
        const container = document.getElementById('customAccount');

        // Render Sign In immediately as a non-blocking default
        container.innerHTML = '<a href="/web/login">Sign In</a>';

        fetch('/web/session/get_session_info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: '{}',
            priority: 'low'
        })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                const uid = data.result?.uid;
                if (uid && uid !== false) {
                    container.innerHTML = `
                        <a href="#" id="accountToggle" aria-haspopup="true" aria-expanded="false">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" aria-hidden="true" focusable="false">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </a>
                        <div id="accountMenu" role="menu" style="display:none;">
                            <a href="/my/home" role="menuitem">My Account</a>
                            <a href="/web/session/logout?redirect=/" role="menuitem">Logout</a>
                        </div>`;

                    const accountToggle = document.getElementById('accountToggle');
                    const accountMenu = document.getElementById('accountMenu');

                    accountToggle.onclick = function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const isVisible = accountMenu.style.display !== 'none';
                        accountMenu.style.display = isVisible ? 'none' : 'block';
                        accountToggle.setAttribute('aria-expanded', !isVisible);
                    };

                    document.addEventListener('click', function (event) {
                        if (!container.contains(event.target) && accountMenu.style.display !== 'none') {
                            accountMenu.style.display = 'none';
                            accountToggle.setAttribute('aria-expanded', false);
                        }
                    });
                }
                // Unauthenticated: Sign In already rendered, nothing to do
            })
            .catch(() => {
                // On error, Sign In already rendered, leave it
            });
    })();

</script>
