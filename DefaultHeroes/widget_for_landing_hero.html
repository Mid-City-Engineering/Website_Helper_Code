<script>
    // change from null to actual string for replacement        
    productName = null;
    backgroundVideoLink = null;
    posterMediaLink = "YOUR_POSTER_URL_HERE";
    posterAlt = null;
    mediaObjectPosition = null;
    mediaObjectPositionMobile = null;
    mediaObjectPositionTablet = null;
    headerBackground = null;

    // Kick off the poster fetch as early as possible
    if (posterMediaLink != null) {
        const preload = document.createElement('link');
        preload.rel = 'preload';
        preload.as = 'image';
        preload.href = posterMediaLink;
        preload.setAttribute('fetchpriority', 'high');
        document.head.appendChild(preload);
    }
</script>

<style>
    /* We need to set a height for the hero placeholder to not trigger content block 
       fade in animation before applicable. If not done, the first few content blocks appear
       immediately and their animation is executed. So when the hero loads and pushes those
       content blocks down, they are already visible and the animation is not executed.
    */

    /* Match hero-placeholder-height to the fetched hero's hero-overall-height variable */
    :root {
        --hero-placeholder-height: 100vh;
    }

    .hero-placeholder {
        height: var(--hero-placeholder-height);
        background: radial-gradient(ellipse 75% 75% at 90% 10%, #810305 0%, black 100%);
        /* Fallback background gradient while media loads */
    }

    @media (max-width: 768px) and (min-width: 481px) {
        :root {
            --hero-placeholder-height: 85vh;
        }
    }

    @media (max-width: 480px) {
        :root {
            --hero-placeholder-height: 70vh;
        }
    }
</style>

<div class="hero-placeholder" id="custom-header-hero"></div>

<script>
    (function () {
        // const TEMPLATE_HERO_LINK = '/documents/content/gyEq9xruTVyrodnhyJDfGgo43?download=0'
        const TEMPLATE_HERO_LINK = '/documents/content/kqWThsUaSk-E3VDlpHzo7wo100?download=0'
        fetch(TEMPLATE_HERO_LINK)
            .then(r => r.text())
            .then(html => {
                const container = document.getElementById('custom-header-hero');

                // Parse the fetched HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Inject styles
                doc.querySelectorAll('style').forEach(style => {
                    container.appendChild(document.adoptNode(style));
                });

                // Inject HTML body content
                const body = doc.querySelector('body');
                if (body) {
                    Array.from(body.children).forEach(el => {
                        if (el.tagName !== 'SCRIPT') {
                            container.appendChild(document.adoptNode(el));
                        }
                    });
                } else {
                    // If no <body>, grab non-script/style elements from <html>
                    doc.querySelectorAll('html > *:not(script):not(style), html *:not(head):not(script):not(style)').forEach(el => {
                        container.appendChild(document.adoptNode(el));
                    });
                }

                // Override product name
                const mainProductOrSeries = container.querySelector('.main-product-or-series');
                if (mainProductOrSeries && productName != null) {
                    mainProductOrSeries.innerHTML = productName;
                }

                // Wire up poster image
                const heroPoster = container.querySelector('#heroPoster');
                const heroVideo = container.querySelector('.hero-media');

                if (heroPoster && posterMediaLink != null) {
                    heroPoster.src = posterMediaLink;
                    heroPoster.alt = posterAlt ?? '';
                    heroPoster.style.display = '';
                }

                // Wire up video, or remove it if no video is provided
                if (backgroundVideoLink != null) {
                    const source = heroVideo.querySelector('source');
                    if (source) {
                        source.src = backgroundVideoLink;
                        heroVideo.load();
                    }
                } else {
                    heroVideo.remove();
                }

                // Override media focus point — applies to both poster and video
                // so the framing stays consistent before and after the video loads
                if (mediaObjectPosition != null) {
                    const mediaElements = [heroPoster, backgroundVideoLink != null ? heroVideo : null]
                        .filter(Boolean);

                    function applyMediaPosition() {
                        const position = window.matchMedia('(max-width: 480px)').matches
                            ? (mediaObjectPositionMobile ?? mediaObjectPosition)
                            : window.matchMedia('(max-width: 768px)').matches
                                ? (mediaObjectPositionTablet ?? mediaObjectPosition)
                                : mediaObjectPosition;

                        mediaElements.forEach(el => el.style.objectPosition = position);
                    }
                    applyMediaPosition();
                    window.addEventListener('resize', applyMediaPosition);
                }

                // Code to override hero-header background
                const heroHeader = container.querySelector('.hero-header');
                if (heroHeader && headerBackground != null) {
                    heroHeader.style.background = headerBackground;
                }

                // Execute scripts (they won't run via innerHTML/adoptNode)
                doc.querySelectorAll('script').forEach(origScript => {
                    const newScript = document.createElement('script');
                    if (origScript.src) {
                        newScript.src = origScript.src;
                    } else {
                        newScript.textContent = origScript.textContent;
                    }
                    container.appendChild(newScript);
                });
            })
            .catch(err => console.error('Failed to load header/hero:', err));
    })();
</script>
