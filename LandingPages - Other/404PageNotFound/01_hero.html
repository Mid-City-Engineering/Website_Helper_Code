<style>
    /* ── SCOPED TO .mce-404 ONLY ── */
    .mce-404 {
        position: relative;
        width: 100%;
        min-height: 100vh;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Outfit', sans-serif;
        color: #fff;
    }

    /* ── BACKGROUNDS (absolute, scoped inside .mce-404) ── */
    .mce-404__bg-grid {
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(129, 3, 5, 0.06) 1px, transparent 1px),
            linear-gradient(90deg, rgba(129, 3, 5, 0.06) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: 0;
        pointer-events: none;
    }

    .mce-404__bg-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 30%, #000 100%);
        z-index: 1;
        pointer-events: none;
    }

    .mce-404__bg-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(129, 3, 5, 0.18) 0%, transparent 70%);
        z-index: 0;
        animation: mce404-glowPulse 4s ease-in-out infinite;
        pointer-events: none;
    }

    @keyframes mce404-glowPulse {

        0%,
        100% {
            opacity: 0.6;
            transform: translate(-50%, -50%) scale(1);
        }

        50% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.15);
        }
    }

    /* ── PAGE CONTENT ── */
    .mce-404__page {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 80px 24px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }

    /* ── WORDMARK ── */
    .mce-404__wordmark {
        font-family: 'Michroma', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.25em;
        color: #D4AF85;
        text-decoration: none;
        opacity: 0;
        animation: mce404-fadeSlideDown 0.6s ease-out 0.2s forwards;
        margin-bottom: 48px;
        display: block;
    }

    /* ── 404 ── */
    .mce-404__code-wrap {
        position: relative;
        margin-bottom: 32px;
        opacity: 0;
        animation: mce404-fadeSlideDown 0.7s ease-out 0.35s forwards;
    }

    .mce-404__code {
        font-family: 'Michroma', sans-serif;
        font-size: clamp(7rem, 20vw, 14rem);
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 1px rgba(212, 175, 133, 0.25);
        letter-spacing: 0.04em;
        user-select: none;
        position: relative;
    }

    .mce-404__code::after {
        content: '404';
        position: absolute;
        inset: 0;
        font-family: 'Michroma', sans-serif;
        font-size: inherit;
        line-height: inherit;
        letter-spacing: inherit;
        color: #810305;
        clip-path: inset(0 100% 0 0);
        animation: mce404-revealCode 1s cubic-bezier(0.23, 1, 0.32, 1) 0.6s forwards;
    }

    @keyframes mce404-revealCode {
        to {
            clip-path: inset(0 0% 0 0);
        }
    }

    /* ── DIVIDER ── */
    .mce-404__divider {
        width: 80px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #810305, #D4AF85, transparent);
        margin-bottom: 32px;
        opacity: 0;
        animation: mce404-fadeSlideDown 0.6s ease-out 0.8s forwards;
    }

    /* ── HEADLINE ── */
    .mce-404__headline {
        font-family: 'Michroma', sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        letter-spacing: 0.08em;
        color: #fff;
        margin-bottom: 16px;
        opacity: 0;
        animation: mce404-fadeSlideDown 0.6s ease-out 0.9s forwards;
        font-weight: 400;
    }

    .mce-404__headline em {
        font-style: normal;
        color: #D4AF85;
    }

    /* ── SUBTEXT ── */
    .mce-404__subtext {
        font-family: 'Outfit', sans-serif;
        font-weight: 300;
        font-size: clamp(0.9rem, 1.5vw, 1.05rem);
        color: #ccc;
        line-height: 1.7;
        max-width: 480px;
        margin-bottom: 52px;
        opacity: 0;
        animation: mce404-fadeSlideDown 0.6s ease-out 1s forwards;
    }

    /* ── TIMER BLOCK ── */
    .mce-404__redirect-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        opacity: 0;
        animation: mce404-fadeSlideDown 0.6s ease-out 1.1s forwards;
    }

    .mce-404__redirect-label {
        font-family: 'Outfit', sans-serif;
        font-size: 0.8rem;
        font-weight: 400;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #555;
    }

    .mce-404__timer-wrap {
        position: relative;
        width: 84px;
        height: 84px;
    }

    .mce-404__timer-svg {
        transform: rotate(-90deg);
        width: 84px;
        height: 84px;
    }

    .mce-404__timer-track {
        fill: none;
        stroke: rgba(212, 175, 133, 0.12);
        stroke-width: 2;
    }

    .mce-404__timer-arc {
        fill: none;
        stroke: #810305;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 226;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear;
    }

    .mce-404__timer-number {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Michroma', sans-serif;
        font-size: 1.6rem;
        color: #fff;
    }

    /* ── CTA BUTTON ── */
    .mce-404__btn {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 36px;
        border: 1.5px solid #810305;
        background: transparent;
        color: #fff;
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        transition: color 0.4s ease, border-color 0.4s ease;
        cursor: pointer;
    }

    .mce-404__btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #810305;
        transition: left 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 0;
    }

    .mce-404__btn:hover::after {
        left: 0;
    }

    .mce-404__btn:hover {
        color: #fff !important;
        text-decoration: none !important;
    }

    .mce-404__btn span,
    .mce-404__btn svg {
        position: relative;
        z-index: 1;
    }

    .mce-404__btn svg {
        transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .mce-404__btn:hover svg {
        transform: translateX(5px);
    }

    /* ── SHARED ENTRANCE ── */
    @keyframes mce404-fadeSlideDown {
        from {
            opacity: 0;
            transform: translateY(-12px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
        .mce-404__code {
            -webkit-text-stroke-width: 0.5px;
        }

        .mce-404__subtext {
            margin-bottom: 36px;
        }

        .mce-404__page {
            padding: 60px 24px;
        }
    }
</style>

<div class="mce-404">

    <div class="mce-404__bg-grid"></div>
    <div class="mce-404__bg-vignette"></div>
    <div class="mce-404__bg-glow"></div>

    <div class="mce-404__page">

        <a href="/" class="mce-404__wordmark">MID CITY ENGINEERING</a>

        <div class="mce-404__code-wrap">
            <div class="mce-404__code">404</div>
        </div>

        <div class="mce-404__divider"></div>

        <h1 class="mce-404__headline">This page <em>doesn't exist.</em></h1>

        <p class="mce-404__subtext">
            The page you're looking for may have been moved, renamed, or removed.
            You'll be returned to the home page automatically.
        </p>

        <div class="mce-404__redirect-block">
            <span class="mce-404__redirect-label">Redirecting in</span>

            <div class="mce-404__timer-wrap">
                <svg class="mce-404__timer-svg" viewBox="0 0 84 84">
                    <circle class="mce-404__timer-track" cx="42" cy="42" r="36" />
                    <circle class="mce-404__timer-arc" cx="42" cy="42" r="36" id="mce404Arc" />
                </svg>
                <div class="mce-404__timer-number" id="mce404Num">10</div>
            </div>

            <a href="/" class="mce-404__btn">
                <span>Go now</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </a>
        </div>

    </div>

</div>

<script>
    (function () {
        const TOTAL = 10;
        const CIRCUM = 226;
        const arc = document.getElementById('mce404Arc');
        const numEl = document.getElementById('mce404Num');
        let remaining = TOTAL;

        function tick() {
            remaining--;
            numEl.textContent = remaining;
            arc.style.strokeDashoffset = ((TOTAL - remaining) / TOTAL) * CIRCUM;
            if (remaining <= 0) {
                window.location.href = '/';
            } else {
                setTimeout(tick, 1000);
            }
        }

        setTimeout(tick, 1000);
    })();
</script>
