<script>
    const ANNOUNCEMENTS = OdooAnnouncements;

    const AUTOPLAY_MS = 6000;
</script>

<style>

        opacity: 0.4;

    .ann-cta::before {
        content: '';

        top: 0;

    .ann-cta span,

    .ann-cta-secondary {
        display: inline-flex;

    }

    .ann-cta-secondary:hover {
        color: var(--mce-sepia-tan);
        border-bottom-color: var(--mce-sepia-tan);
    }

    /* ── Nav ─────────────────────────────────────────────────── */
    .ann-nav {
        position: relative;

        gap: 24px;

    /* ── Drag suppression ────────────────────────────────────── */
    .ann-track.is-dragging .ann-slide {
        transition: none !important;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {

        .ann-nav {
            justify-content: center;
        }

        .ann-slide-body {
            flex-direction: column;
            align-items: center;
        }

        .ann-slide-body-text {
            width: 90%;

        }

        .ann-slide-body-buttons {

            margin-left: 0;
        }
    }
</style>

<div class="ann-banner">
    <div class="ann-track" id="annTrack"></div>
    <div class="ann-nav">
        <button class="ann-arrow" id="annPrev" aria-label="Previous">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"></path>
                <path d="m12 19-7-7 7-7"></path>
            </svg>
        </button>
        <div class="ann-dots" id="annDots"></div>
        <button class="ann-arrow" id="annNext" aria-label="Next">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
            </svg>
        </button>
        <button class="ann-pause" id="annPause" aria-label="Pause">
            <svg id="annPauseIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>
    </div>
</div>

<script>
    (function () {
        function compile(str) {
            return str
                .replace(/\n/g, '<br />')
                .replace(/\[\[(.+?)\]\]/g, '[$1]')
                .replace(/\[(.+?)\]/g, '<span class="ann-tan">$1</span>');
        }

        const ARROW_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
        const ICON_PAUSE = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
        const ICON_PLAY = `<polygon points="5,3 19,12 5,21"/>`;

        const track = document.getElementById('annTrack');
        const dotsWrap = document.getElementById('annDots');
        const prevBtn = document.getElementById('annPrev');
        const nextBtn = document.getElementById('annNext');
        const pauseBtn = document.getElementById('annPause');
        const pauseIcon = document.getElementById('annPauseIcon');

        if (!track || !ANNOUNCEMENTS || !ANNOUNCEMENTS.length) {
            document.querySelector('.ann-nav').style.display = 'none';
            return;
        }

        // ── Build slides ──────────────────────────────────────────
        ANNOUNCEMENTS.forEach((item, i) => {
            const [primaryLink, ...secondaryLinks] = item.links || [];

            const primaryHTML = primaryLink ? `
            <a href="${primaryLink.href}" class="ann-cta">
                <span>${primaryLink.text}</span>
                ${ARROW_SVG}
            </a>` : '';

            const secondaryHTML = secondaryLinks.map(l => `
            <a href="${l.href}" class="ann-cta-secondary">
                ${l.text}
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>`).join('');

            let mediaHTML = '';
            if (item.mediaLink) {
                mediaHTML = item.isVideo === true
                    ? `<div class="ann-slide-body-media"><div class="ann-media"><video src="${item.mediaLink}" autoplay muted loop playsinline></video></div></div>`
                    : `<div class="ann-slide-body-media"><div class="ann-media"><img src="${item.mediaLink}" alt="" loading="lazy"></div></div>`;
            }

            const slide = document.createElement('div');
            slide.className = 'ann-slide';
            slide.innerHTML = `
            <div class="ann-slide-top">
                <div class="ann-eyebrow">
                    <div class="ann-divider"></div>
                </div>
            </div>
            <div class="ann-slide-body">
                <div class="ann-slide-body-text">
                    <h2 class="ann-headline">${compile(item.headline)}</h2>
                    ${item.sub ? `<p class="ann-sub">${compile(item.sub)}</p>` : ''}
                </div>
                ${mediaHTML}
                <div class="ann-slide-body-buttons">
                    ${primaryHTML}
                    ${secondaryHTML}
                </div>
            </div>`;

            track.appendChild(slide);

            const dot = document.createElement('button');
            dot.className = 'ann-dot' + (i === 0 ? ' is-active' : '');
            dot.setAttribute('aria-label', `Slide ${i + 1}`);
            dot.dataset.index = i;
            dotsWrap.appendChild(dot);
        });

        const slides = track.querySelectorAll('.ann-slide');
        const dots = dotsWrap.querySelectorAll('.ann-dot');
        const n = slides.length;
        let current = 0;
        let paused = false;
        let animating = false;

        const SLIDE_DURATION = 420;
        const SNAP_DURATION = 320;

        // ── Position helpers ──────────────────────────────────────
        function setSlide(slide, x, duration) {
            slide.style.transition = duration > 0
                ? `transform ${duration}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`
                : 'none';
            slide.style.transform = `translateX(${x}px)`;
        }

        function initPositions() {
            slides.forEach((s, i) => {
                setSlide(s, i === current ? 0 : track.offsetWidth, 0);
            });
        }

        // ── Track height ──────────────────────────────────────────
        function lockTrackHeight() {
            slides.forEach(s => {
                s.style.position = 'relative';
                s.style.transform = '';
                s.style.visibility = 'hidden';
            });

            let maxHeight = 0;
            slides.forEach(s => {
                maxHeight = Math.max(maxHeight, s.offsetHeight);
            });

            slides.forEach(s => {
                s.style.position = '';
                s.style.visibility = '';
            });

            track.style.minHeight = maxHeight + 'px';

            initPositions(); // ← re-park all slides after measuring
        }

        initPositions();
        lockTrackHeight();

        // ── Clock ─────────────────────────────────────────────────
        let clockStart = null;
        let elapsed = 0;
        let rafId = null;

        function tickProgress() {
            if (paused) return;
            const total = elapsed + (Date.now() - clockStart);
            const pct = Math.min(total / AUTOPLAY_MS, 1);
            if (total >= AUTOPLAY_MS) { goTo(current + 1); return; }
            rafId = requestAnimationFrame(tickProgress);
        }

        function startClock() {
            cancelAnimationFrame(rafId);
            clockStart = Date.now();
            rafId = requestAnimationFrame(tickProgress);
        }

        function pauseClock() {
            cancelAnimationFrame(rafId);
            if (clockStart !== null) elapsed += Date.now() - clockStart;
            clockStart = null;
        }

        function resumeClock() {
            clockStart = Date.now();
            rafId = requestAnimationFrame(tickProgress);
        }

        function resetClock() {
            cancelAnimationFrame(rafId);
            elapsed = 0;
            clockStart = null;
            if (!paused) startClock();
        }

        // ── Navigation ────────────────────────────────────────────
        function goTo(idx) {
            if (animating) return;
            const next = (idx + n) % n;
            if (next === current) return;
            animating = true;

            const dir = next > current || (current === n - 1 && next === 0) ? 1 : -1;
            const w = track.offsetWidth;

            setSlide(slides[next], dir * w, 0);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    setSlide(slides[current], -dir * w, SLIDE_DURATION);
                    setSlide(slides[next], 0, SLIDE_DURATION);

                    dots[current].classList.remove('is-active');
                    dots[next].classList.add('is-active');
                    current = next;
                    resetClock();

                    setTimeout(() => { animating = false; }, SLIDE_DURATION);
                });
            });
        }

        prevBtn.addEventListener('click', () => goTo(current - 1));
        nextBtn.addEventListener('click', () => goTo(current + 1));
        dots.forEach(dot => dot.addEventListener('click', () => goTo(+dot.dataset.index)));

        // ── Pause / resume ────────────────────────────────────────
        pauseBtn.addEventListener('click', () => {
            paused = !paused;
            pauseIcon.innerHTML = paused ? ICON_PLAY : ICON_PAUSE;
            pauseBtn.setAttribute('aria-label', paused ? 'Play' : 'Pause');
            if (paused) pauseClock();
            else resumeClock();
        });

        // ── Drag / swipe ──────────────────────────────────────────
        const THRESHOLD = () => window.innerWidth * 0.20;

        let dragStartX = null;
        let dragStartY = null;
        let dragAxis = null;
        let clockWasPaused = false;
        let neighbourIdx = null;

        function onDragStart(clientX, clientY) {
            if (animating) return;
            dragStartX = clientX;
            dragStartY = clientY;
            dragAxis = null;
            neighbourIdx = null;
            clockWasPaused = paused;
            if (!paused) pauseClock();
        }

        function onDragMove(clientX) {
            if (dragStartX === null) return;
            const dx = clientX - dragStartX;

            if (!dragAxis) {
                const adx = Math.abs(dx);
                const ady = Math.abs((dragStartY || 0));
                if (adx > 6) dragAxis = 'h';
                else if (ady > 6) { dragAxis = 'v'; return; }
                else return;
            }
            if (dragAxis !== 'h') return;

            if (neighbourIdx === null) {
                neighbourIdx = dx < 0
                    ? (current + 1) % n
                    : (current - 1 + n) % n;
                setSlide(slides[neighbourIdx], (dx < 0 ? 1 : -1) * track.offsetWidth, 0);
                track.classList.add('is-dragging');
            }

            const w = track.offsetWidth;
            const clampedDx = Math.max(-w, Math.min(w, dx));
            const sign = dx < 0 ? 1 : -1;
            setSlide(slides[current], clampedDx, 0);
            setSlide(slides[neighbourIdx], sign * w + clampedDx, 0);
        }

        function onDragEnd(clientX) {
            if (dragStartX === null) return;
            const delta = clientX - dragStartX;
            track.classList.remove('is-dragging');

            if (dragAxis !== 'h' || neighbourIdx === null) {
                dragStartX = null;
                if (!clockWasPaused) resumeClock();
                return;
            }

            const w = track.offsetWidth;

            if (Math.abs(delta) > THRESHOLD()) {
                animating = true;
                setSlide(slides[current], (delta < 0 ? -1 : 1) * w, SNAP_DURATION);
                setSlide(slides[neighbourIdx], 0, SNAP_DURATION);

                dots[current].classList.remove('is-active');
                dots[neighbourIdx].classList.add('is-active');
                current = neighbourIdx;
                resetClock();

                setTimeout(() => { animating = false; }, SNAP_DURATION);
            } else {
                setSlide(slides[current], 0, SNAP_DURATION);
                setSlide(slides[neighbourIdx], (delta < 0 ? 1 : -1) * w, SNAP_DURATION);

                if (!clockWasPaused) {
                    setTimeout(() => { if (!paused) resumeClock(); }, SNAP_DURATION);
                }
            }

            dragStartX = null;
            neighbourIdx = null;
            dragAxis = null;
        }

        // Add manual sliding if we have more than 1 slide
        if (n > 1) {
            track.addEventListener('pointerdown', e => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                if (e.target.closest('a, button')) return;
                track.setPointerCapture(e.pointerId);
                onDragStart(e.clientX, e.clientY);
            });

            track.addEventListener('pointermove', e => {
                if (dragStartX === null) return;
                if (!dragAxis) {
                    const adx = Math.abs(e.clientX - dragStartX);
                    const ady = Math.abs(e.clientY - dragStartY);
                    if (adx > 6 || ady > 6) dragAxis = adx >= ady ? 'h' : 'v';
                }
                if (dragAxis !== 'h') return;
                e.preventDefault();
                onDragMove(e.clientX);
            }, { passive: false });

            track.addEventListener('pointerup', e => onDragEnd(e.clientX));
            track.addEventListener('pointercancel', e => onDragEnd(e.clientX));
        }


        window.addEventListener('resize', () => {
            const w = track.offsetWidth;
            slides.forEach((s, i) => {
                if (i !== current) setSlide(s, w, 0);
            });
            lockTrackHeight();
        });

        // ── IntersectionObserver ──────────────────────────────────
        const io = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (paused) return;
                if (e.isIntersecting) resumeClock();
                else pauseClock();
            });
        }, { threshold: 0.25 });
        io.observe(document.querySelector('.ann-banner'));

        if (slides.length < 2) {
            document.querySelector('.ann-nav').style.display = 'none';
        }

        if (AUTOPLAY_MS && slides.length > 1) startClock();

    })();

</script>
