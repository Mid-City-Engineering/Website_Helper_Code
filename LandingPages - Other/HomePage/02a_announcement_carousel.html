<div class="ann-banner">
    <div class="ann-track" id="annTrack"></div>

            <svg id="annPauseIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>
        <button class="ann-arrow" id="annPrev" aria-label="Previous">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"></path>
                <path d="m12 19-7-7 7-7"></path>
            </svg>
        </button>
        <button class="ann-arrow" id="annNext" aria-label="Next">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
            </svg>
        </button>
    </div>
</div>

<script>
    (function () {
        function compile(str) {
            return str
                .replace(/\n/g, '<br />')
                .replace(/\[\[(.+?)\]\]/g, '[$1]')
                .replace(/\*(.+?)\*/g, '<span class="ann-tan">$1</span>');
        }

        const ARROW_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
        const ICON_PAUSE = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
        const ICON_PLAY = `<polygon points="5,3 19,12 5,21"/>`;

        const track = document.getElementById('annTrack');
        const dotsWrap = document.getElementById('annDots');
        const progress = document.getElementById('annProgress');
        const prevBtn = document.getElementById('annPrev');
        const nextBtn = document.getElementById('annNext');
        const pauseBtn = document.getElementById('annPause');
        const pauseIcon = document.getElementById('annPauseIcon');

        if (!track || !ANNOUNCEMENTS || !ANNOUNCEMENTS.length) {
            document.querySelector('.ann-nav').style.display = 'none';
            return;
        }

        // ── Build slides ──────────────────────────────────────────
        ANNOUNCEMENTS.forEach((item, i) => {
            const [primaryLink, ...secondaryLinks] = item.links || [];

            const primaryHTML = primaryLink ? `
                <a href="${primaryLink.href}" class="ann-cta">
                    <span>${primaryLink.text}</span>
                    ${ARROW_SVG}
                </a>` : '';

            const secondaryHTML = secondaryLinks.map(l => `
                <a href="${l.href}" class="ann-cta-secondary">
                    ${l.text}
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>`).join('');

            const eyebrowHTML = `
                <div class="ann-eyebrow">
                    <span class="ann-announcement">Announcement</span>
                    <div class="ann-divider"></div>
                </div>`;

            const slide = document.createElement('div');
            slide.className = 'ann-slide' + (i === 0 ? ' is-active' : '');
            slide.innerHTML = `
                <div class="ann-text">
                    ${eyebrowHTML}
                    <h2 class="ann-headline">${compile(item.headline)}</h2>
                    <p class="ann-sub">${compile(item.sub)}</p>
                </div>
                <div class="ann-cta-wrap">
                    ${primaryHTML}
                    ${secondaryHTML}
                </div>`;
            track.appendChild(slide);

            const dot = document.createElement('button');
            dot.className = 'ann-dot' + (i === 0 ? ' is-active' : '');
            dot.setAttribute('aria-label', `Slide ${i + 1}`);
            dot.dataset.index = i;
            dotsWrap.appendChild(dot);
        });

        const slides = track.querySelectorAll('.ann-slide');
        const dots = dotsWrap.querySelectorAll('.ann-dot');
        let current = 0;
        let paused = false;

        // ── Clock: tracks elapsed time precisely ──────────────────
        let clockStart = null;  // Date.now() when current tick began
        let elapsed = 0;     // ms already consumed this tick
        let rafId = null;

        function tickProgress() {
            if (paused) return;
            const now = Date.now();
            const total = elapsed + (now - clockStart);
            const pct = Math.min(total / AUTOPLAY_MS, 1);

            // Drive progress bar width directly from clock
            progress.style.transition = 'none';
            progress.style.width = (pct * 86) + '%';

            if (pct >= 1) {
                goTo(current + 1);
                return;
            }
            rafId = requestAnimationFrame(tickProgress);
        }

        function startClock() {
            cancelAnimationFrame(rafId);
            clockStart = Date.now();
            rafId = requestAnimationFrame(tickProgress);
        }

        function pauseClock() {
            cancelAnimationFrame(rafId);
            elapsed += Date.now() - clockStart;
        }

        function resumeClock() {
            clockStart = Date.now();
            rafId = requestAnimationFrame(tickProgress);
        }

        function resetClock() {
            cancelAnimationFrame(rafId);
            elapsed = 0;
            progress.style.width = '0';
            if (!paused) startClock();
        }

        // ── Navigation ────────────────────────────────────────────
        function goTo(idx) {
            slides[current].classList.remove('is-active');
            dots[current].classList.remove('is-active');
            current = (idx + slides.length) % slides.length;
            slides[current].classList.add('is-active');
            dots[current].classList.add('is-active');
            resetClock();
        }

        prevBtn.addEventListener('click', () => goTo(current - 1));
        nextBtn.addEventListener('click', () => goTo(current + 1));
        dots.forEach(dot => dot.addEventListener('click', () => goTo(+dot.dataset.index)));

        // ── Pause / resume ────────────────────────────────────────
        pauseBtn.addEventListener('click', () => {
            paused = !paused;
            pauseIcon.innerHTML = paused ? ICON_PLAY : ICON_PAUSE;
            pauseBtn.setAttribute('aria-label', paused ? 'Play' : 'Pause');
            if (paused) pauseClock();
            else resumeClock();
        });

        // ── IntersectionObserver: pause when off-screen ───────────
        const io = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (!paused) {
                    if (e.isIntersecting) resumeClock();
                    else pauseClock();
                }
            });
        }, { threshold: 0.25 });
        io.observe(document.querySelector('.ann-banner'));

        // ── Hide nav when only one slide ─────────────────────────
        if (slides.length < 2) {
            document.querySelector('.ann-nav').style.display = 'none';
        }

        // ── Boot ──────────────────────────────────────────────────
        if (AUTOPLAY_MS && slides.length > 1) startClock();

    })();
</script>
