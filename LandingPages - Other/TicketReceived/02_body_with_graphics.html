<style>
    .form-success-container {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 5%;
        min-height: 50vh;
        border-top: 5px solid var(--mce-sepia-tan);
    }

    .success-content-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 1000px;
        width: 100%;
        gap: 80px;
        opacity: 0;
        animation: fadeIn 0.6s ease-out 0.2s forwards;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }

    .success-message-left {
        flex: 1;
        padding-right: 60px;
        border-right: 2px solid transparent;
        border-image: linear-gradient(180deg, var(--mce-dark-red), var(--mce-sepia-tan)) 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .success-checkmark-header {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #28a745;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 0 25px 0;
        transform: scale(0);
        animation: checkmarkPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.3s forwards;
    }

    .success-checkmark-header svg {
        width: 40px;
        height: 40px;
        stroke: white;
        stroke-width: 4;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: checkmarkDraw 0.5s ease-out 0.6s forwards;
    }

    @keyframes checkmarkPop {
        to {
            transform: scale(1);
        }
    }

    @keyframes checkmarkDraw {
        to {
            stroke-dashoffset: 0;
        }
    }

    .success-message-left p {
        font-family: 'Outfit', sans-serif;
        font-weight: 400;
        font-size: clamp(1rem, 1.8vw, 1.1rem);
        color: #444444;
        margin: 0 0 30px 0;
        line-height: 1.7;
        transform: translateY(20px);
        opacity: 0;
        animation: slideUp 0.5s ease-out 0.8s forwards;
    }

    @keyframes slideUp {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .success-home-link {
        display: inline-block;
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        font-size: 0.95rem;
        color: var(--mce-dark-red);
        text-decoration: none;
        transition: all 0.3s ease;
        opacity: 0;
        animation: fadeIn 0.4s ease-out 1.1s forwards;
        position: relative;
    }

    .success-home-link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--mce-sepia-tan);
        transition: width 0.3s ease;
    }

    .success-home-link:hover {
        color: var(--mce-sepia-tan);
        transform: translateX(-4px);
    }

    .success-home-link:hover::after {
        width: 100%;
    }

    .success-visual-right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .success-logo {
        transform: scale(0.8);
        opacity: 0;
        animation: logoFadeIn 0.6s ease-out 0.9s forwards;
    }

    @keyframes logoFadeIn {
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .success-logo img {
        max-width: 280px;
        height: auto;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .form-success-container {
            padding: 60px 5%;
        }

        .success-content-wrapper {
            flex-direction: column;
            gap: 50px;
        }

        .success-message-left {
            padding-right: 0;
            border-right: none;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, var(--mce-dark-red), var(--mce-sepia-tan)) 1;
            padding-bottom: 40px;
        }

        .success-logo img {
            max-width: 220px;
        }
    }
</style>

<div class="form-success-container">
    <div class="success-content-wrapper">
        <div class="success-message-left">
            <div class="success-checkmark-header">
                <svg viewBox="0 0 52 52">
                    <polyline points="14 27 22 35 38 19"></polyline>
                </svg>
            </div>
            <p>Your ticket has been submitted successfully. Our team will get back to you shortly.</p>
            <a href="/" class="success-home-link">← Return to Home</a>
        </div>

        <div class="success-visual-right">
            <div class="success-logo">
                <img src="/documents/content/naZlHr47T1uGIwXrx_h2uQo2f?download=0" alt="Mid City Engineering"
                    loading="lazy">
            </div>
        </div>
    </div>
</div>
