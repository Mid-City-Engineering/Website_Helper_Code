<script>
    const SELECTOR_CONFIG = {
        heading: "Find The Support Document For Your Product",
        subheading: "Select your product type and SKU below to find installation guides and manuals.",
    };

    function getSelectorData() {
        // Guard: return null if Odoo data hasn't been injected into the page
        if (typeof OdooProductData === 'undefined' || OdooProductData === null) return null;

        const result = [];

        for (const p of OdooProductData) {
            // 1. Split pipe-separated types (e.g. "Eco Off | OBD Feature Programmers") into an array.
            // 2. Fall back to ['Miscellaneous'] if the type field is empty/null.
            const types = p.type
                ? p.type.split('|').map(t => t.trim()).filter(Boolean)
                : ['Miscellaneous'];

            // Duplicate the product entry for each type so it appears under all relevant categories
            for (const type of types) {
                result.push({ ...p, type });
            }
        }
        return result;
    }
</script>

<div class="mce-sel-section" id="mce-selector">
    <div class="mce-sel-inner">
        <div class="mce-sel-header">
            <h2 id="mce-sel-heading">Find Your Documentation</h2>
            <p id="mce-sel-subheading"></p>
        </div>
        <div class="mce-sel-steps" id="mce-sel-steps" role="tablist"></div>
        <div class="mce-sel-crumb-row">
            <div class="mce-sel-crumb" id="mce-sel-crumb" aria-label="Current selection"></div>
            <button class="mce-sel-restart" id="mce-sel-restart" onclick="mceDocRestartSelector()"
                style="display:none;">
                Start Over
            </button>
        </div>
        <div id="mce-sel-content"></div>
    </div>
</div>


<!-- ============================================================
     BLOCK 4: SELECTOR UI
     ============================================================ -->
<script>
    (function () {

        document.getElementById('mce-sel-heading').textContent = SELECTOR_CONFIG.heading;
        document.getElementById('mce-sel-subheading').innerHTML = SELECTOR_CONFIG.subheading;

        const STEP_NAMES = ["Product Type", "SKU"];

        let data = [];
        let sel = { type: null, sku: null };
        let currentStep = 0;

        function init() {
            data = getSelectorData();
            if (!data || !data.length) {
                document.getElementById('mce-sel-content').innerHTML =
                    '<div class="mce-sel-empty"><p>No product data loaded.</p></div>';
                return;
            }
            goStep(0);
        }

        function renderTabs() {
            document.getElementById('mce-sel-steps').innerHTML =
                STEP_NAMES.map((name, i) => {
                    let cls = 'mce-sel-tab';
                    if (i === currentStep) cls += ' is-active';
                    else if (i < currentStep) cls += ' is-done';
                    return `<div class="${cls}" role="tab" onclick="mceDocGoStep(${i})">
                        <span class="mce-sel-tab-num">STEP ${i + 1}</span>
                        ${name}
                    </div>`;
                }).join('');
        }

        window.mceDocGoStep = function (step) {
            if (step >= currentStep) return;
            if (step <= 0) sel.type = null;
            if (step <= 1) sel.sku = null;
            goStep(step);
        };

        function renderCrumb() {
            const parts = [];
            if (sel.type) parts.push({ v: sel.type, s: 0 });
            if (sel.sku) parts.push({ v: sel.sku, s: 1 });

            document.getElementById('mce-sel-crumb').innerHTML = parts.map((p, i) => `
                <span class="mce-crumb-piece">
                    <span class="mce-crumb-val" onclick="mceDocGoStep(${p.s})">${p.v}</span>
                    ${i < parts.length - 1 ? '<span class="mce-crumb-sep">›</span>' : ''}
                </span>`
            ).join('');

            document.getElementById('mce-sel-restart').style.display =
                currentStep > 0 ? 'block' : 'none';
        }

        function goStep(step) {
            currentStep = step;
            renderTabs();
            renderCrumb();

            const el = document.getElementById('mce-sel-content');
            el.classList.remove('mce-sel-anim');
            void el.offsetWidth;
            el.classList.add('mce-sel-anim');
            el.innerHTML = '';

            if (step === 0) renderTypeStep();
            else if (step === 1) renderSkuStep();
            else renderResults();
        }

        window.mceDocRestartSelector = function () {
            sel.type = null;
            sel.sku = null;
            goStep(0);
        };

        function renderTypeStep() {
            const types = [...new Set(data.map(p => p.type))].sort((a, b) => {
                if (a === 'Miscellaneous') return 1;
                if (b === 'Miscellaneous') return -1;
                return a.localeCompare(b);
            });

            renderOptions("Select your product type", types, v => {
                sel.type = v;
                goStep(1);
            });
        }

        function renderSkuStep() {
            const skus = [...new Set(
                data.filter(p => p.type === sel.type).map(p => p.sku)
            )].sort();
            renderOptions("Select your SKU", skus, v => {
                sel.sku = v;
                goStep(2);
            });
        }

        function renderResults() {
            const el = document.getElementById('mce-sel-content');

            const product = data.find(p => p.type === sel.type && p.sku === sel.sku);
            const attachments = product ? product.attachments : [];

            if (!attachments.length) {
                el.innerHTML = `<div class="mce-sel-empty">
                    <p>No documents found for this product.<br>
                    Please <a href="/contactus">contact us</a> and we'll help you find what you need.</p>
                </div>`;
                return;
            }

            el.innerHTML = `
                <div class="mce-sel-results-label">
                    ${attachments.length === 1 ? '1 document found' : attachments.length + ' documents found'}
                </div>
                ${attachments.map(a => `
                    <a class="mce-sel-card" href="${a.url}" target="_blank" rel="noopener">
                        <div class="mce-sel-card-body">
                            <div class="mce-sel-card-sku">${sel.sku}</div>
                            <div class="mce-sel-card-name">${a.name}</div>
                        </div>
                        <div class="mce-sel-card-arrow">&#8594;</div>
                    </a>
                `).join('')}`;
        }

        function renderOptions(labelText, options, onSelect) {
            const el = document.getElementById('mce-sel-content');
            el.innerHTML = `
                <div class="mce-sel-label">${labelText}</div>
                <div class="mce-sel-options">
                    ${options.map(opt => `
                        <button class="mce-sel-btn"
                                onclick="mceDocPickOption(this, '${esc(opt)}')"
                                aria-pressed="false">${opt}</button>
                    `).join('')}
                </div>`;
            el._onSelect = onSelect;
        }

        window.mceDocPickOption = function (btn, value) {
            const el = document.getElementById('mce-sel-content');
            el.querySelectorAll('.mce-sel-btn').forEach(b => {
                b.classList.remove('is-selected');
                b.setAttribute('aria-pressed', 'false');
            });
            btn.classList.add('is-selected');
            btn.setAttribute('aria-pressed', 'true');
            setTimeout(() => { if (el._onSelect) el._onSelect(value); }, 180);
        };

        function esc(s) {
            return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
